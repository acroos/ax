version: 2

builds:
  - main: ./cmd/ax
    binary: ax
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: acroos
      name: homebrew-tap
    homepage: "https://github.com/acroos/ax"
    description: "Agentic coding DX metrics"
    license: "MIT"
    install: |
      bin.install "ax"
    test: |
      system "#{bin}/ax", "--version"

release:
  github:
    owner: acroos
    name: ax
