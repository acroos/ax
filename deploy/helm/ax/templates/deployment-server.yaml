apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ax.fullname" . }}-server
  labels:
    {{- include "ax.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ax.name" . }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ax.name" . }}
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          args: ["server", "--port", "{{ .Values.server.port }}"]
          ports:
            - containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: AX_POSTGRES
              valueFrom:
                secretKeyRef:
                  name: {{ include "ax.fullname" . }}
                  key: postgres-conn
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.server.port }}
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.server.port }}
            initialDelaySeconds: 3
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
