apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ax.fullname" . }}-dashboard
  labels:
    {{- include "ax.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ax.name" . }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ax.name" . }}
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          env:
            - name: AX_API_URL
              value: "http://{{ include "ax.fullname" . }}-server:{{ .Values.server.port }}"
            - name: PORT
              value: "{{ .Values.dashboard.port }}"
            {{- if .Values.apiKey }}
            - name: AX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ax.fullname" . }}
                  key: api-key
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.dashboard.port }}
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
