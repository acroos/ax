# AX Helm Chart Values

server:
  image:
    repository: ghcr.io/acroos/ax
    tag: latest
    pullPolicy: IfNotPresent
  port: 8080
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

dashboard:
  image:
    repository: ghcr.io/acroos/ax-dashboard
    tag: latest
    pullPolicy: IfNotPresent
  port: 3333
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

watcher:
  image:
    repository: ghcr.io/acroos/ax-watcher
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Bitnami PostgreSQL subchart
postgresql:
  enabled: true
  auth:
    database: ax
    username: ax
    password: ""  # Set via --set or secret

# GitHub token for server-side PR polling
github:
  token: ""  # Set via --set or secret

# API key for dashboard → server communication
apiKey: ""  # Set via --set or secret

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ax.internal.company.com
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
        - path: /api
          pathType: Prefix
          service: server
  tls: []
